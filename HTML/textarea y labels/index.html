<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Textarea y Labels</title>
</head>
<body>
    <form>
        <h2>Formulario de contacto</h2>
        <!--SIMPLE INPUTS-->
        <fieldset>
            <legend>Informacion Basica</legend>
            <div class="form_input">
                <label for="nombre">Nombre Completo</label> <!--Los labels se pueden poner aparte y enlazarlo a otro elemento a traves del id del elemento y poner ese id en el for-->
                <input type="text" placeholder="Fernando Toledo" id="nombre">
            </div>
        
            <div class="form_input">
                <label>Email
                    <input type="email" placeholder="fernand@gmail.com">
                </label> <!--Tambien se pueden enlazar poniendo el elemento dentro del label, pero siempre estaran pegados a diferencia de la otra manera en la que si pueden estar en diferentes partes-->
            </div>
            <div class="form_input">
                <label>Asunto
                    <input type="text" placeholder="Su asunto">
                </label>
            </div>
        </fieldset>
        <!--SELECT & OPTION-->
        <div class="form_input">
            <label>Tipo de Usuario
                <select name="type-of-user">
                    <option value="user1">Opcion 1</option>
                    <option value="user2">Opcion 2</option>
                    <option value="user3">Opcion 3</option>
                </select>
            </label>
        </div>
        <!--DATALIST & OPTION-->
        <div class="form_input">
            <label for="Referente">Referente</label>
                <input list="referente" name="referente" id="Referente">
                <datalist id="referente" name="type-of-user">
                    <option value="user1">La empresa</option>
                    <option>Un amigo</option>
                    <option value="Television"></option>
                    <option value="Una Red Social">Facebook, Instagram, Twitter, etc</option> <!-- estas son maneras diferentes de usar el option con datalist, pero la ultima parece ser mas adecuada -->
                </datalist>
        </div>
        <!--TEXTAREA-->
        <div class="form_input">
            <label for="mensaje">Mensaje</label>
            <textarea rows="6" placeholder="Deja un mensaje..." id="mensaje"></textarea>
        </div>
        <div class="form_input">
            <label>Acepto los <a href="../enlaces avanzados/terms.html" target="_blank">terminos y condiciones</a>
                <input type="checkbox" class="checkbox">
            </label>
        </div>
    </form>
</body>
</html>
